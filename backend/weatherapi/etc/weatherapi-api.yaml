Name: weatherapi-api
Host: 0.0.0.0
Port: 45854

# CORS 跨域配置：
#   dev 环境：自动允许所有来源（*），无需配置此项
#   sit/prod 环境：在此配置允许的来源域名列表
# CORSAllowOrigins:
#   - https://your-domain.com
#   - https://admin.your-domain.com

Log:
  ServiceName: weatherapi
  Mode: file
  Path: logs/weatherapi
  Level: debug
  Compress: true
  KeepDays: 7
  MaxSize: 20
  MaxBackups: 5
